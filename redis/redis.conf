# redis/redis.conf
# Drop this file alongside docker-compose.yml if you want fine-grained control.
# Reference it in docker-compose: command: redis-server /usr/local/etc/redis/redis.conf

# ── Memory ────────────────────────────────────────────────────────────────
maxmemory 2gb
# LRU eviction: when full, remove least-recently-used keys
maxmemory-policy allkeys-lru
# Sample size for LRU approximation (higher = more accurate, slower)
maxmemory-samples 10

# ── Persistence (AOF + RDB) ───────────────────────────────────────────────
# RDB snapshot: save if 1000 keys changed in 60s
save 60 1000
save 300 100
save 900 1

# AOF for durability (replay on restart)
appendonly yes
appendfilename "mls-cache.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── Performance ───────────────────────────────────────────────────────────
# Disable slow log for busy servers
slowlog-log-slower-than 10000
slowlog-max-len 128

# TCP keepalive
tcp-keepalive 300

# Max client connections
maxclients 1000

# Lazy free for large key deletes (non-blocking)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ── Logging ───────────────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Security ──────────────────────────────────────────────────────────────
# Uncomment and set a password for production
# requirepass your-strong-redis-password

# Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command DEBUG    ""
rename-command CONFIG   "CONFIG_ADMIN_ONLY"
